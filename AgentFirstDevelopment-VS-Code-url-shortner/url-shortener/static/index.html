<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        
        <div class="input-section">
            <input 
                type="url" 
                id="urlInput" 
                placeholder="Enter URL (e.g., https://example.com/very/long/path)" 
                required
            >
            <button id="shortenBtn" onclick="shortenUrl()">Shorten</button>
        </div>

        <div id="resultSection" class="result-section hidden">
            <div class="result-item">
                <label>Original URL:</label>
                <p id="originalUrl" class="url-text"></p>
            </div>
            <div class="result-item">
                <label>Shortened URL:</label>
                <p>
                    <a id="shortenedUrl" href="#" target="_blank" class="short-link"></a>
                </p>
            </div>
            <button id="copyBtn" onclick="copyToClipboard()" class="copy-btn">Copy Shortened URL</button>
        </div>

        <div id="errorSection" class="error-section hidden">
            <p id="errorMessage"></p>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const shortenBtn = document.getElementById('shortenBtn');
        const resultSection = document.getElementById('resultSection');
        const errorSection = document.getElementById('errorSection');

        // Allow Enter key to shorten URL
        urlInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                shortenUrl();
            }
        });

        async function shortenUrl() {
            const url = urlInput.value.trim();

            // Clear previous results and errors
            resultSection.classList.add('hidden');
            errorSection.classList.add('hidden');

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(error.detail || 'Failed to shorten URL');
                    return;
                }

                const data = await response.json();
                showResult(data);
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        function showResult(data) {
            document.getElementById('originalUrl').textContent = data.original_url;
            document.getElementById('shortenedUrl').href = data.short_url;
            document.getElementById('shortenedUrl').textContent = data.short_url;
            resultSection.classList.remove('hidden');
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = 'Error: ' + message;
            errorSection.classList.remove('hidden');
        }

        function copyToClipboard() {
            const shortenedUrl = document.getElementById('shortenedUrl').textContent;
            navigator.clipboard.writeText(shortenedUrl).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                showError('Failed to copy to clipboard');
            });
        }
    </script>
</body>
</html>
